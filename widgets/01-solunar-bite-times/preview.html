<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FBF · Solunar Bite-Time Calendar — preview</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: #fbfaf7; color: #0B2A3C; margin: 0; padding: 32px 20px; }
  .wrap { max-width: 620px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 800; margin: 0 0 4px; }
  .note { font-size: 13px; color: #6b7d82; margin: 0 0 20px; }
  .ctrl { display: flex; align-items: center; gap: 10px; margin: 0 0 8px; }
  .ctrl label { font-size: 13px; color: #4a6168; }
  select { font-size: 14px; padding: 7px 10px; border: 1px solid #cfd8d4; border-radius: 8px; background: #fff; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Solunar Bite-Time Calendar — live preview</h1>
  <p class="note">Widget #1. Pure browser math (no API), so it works offline. Pick a region to re-render. Refreshes every minute to keep “Biting now / Next up” accurate.</p>

  <div class="ctrl">
    <label for="region">Region</label>
    <select id="region"></select>
  </div>

  <div id="demo" data-fbf-solunar data-region="tampa-bay"></div>
</div>

<script src="../../lib/solunar.js"></script>
<script src="../../lib/regions.js"></script>
<script src="./widget.js"></script>
<script>
  (function () {
    var sel = document.getElementById('region');
    var demo = document.getElementById('demo');
    (window.FBF_REGIONS || []).forEach(function (r) {
      var o = document.createElement('option');
      o.value = r.slug; o.textContent = r.name;
      if (r.slug === 'tampa-bay') o.selected = true;
      sel.appendChild(o);
    });
    sel.addEventListener('change', function () {
      demo.setAttribute('data-region', sel.value);
      window.FBFSolunarWidget.render(demo, sel.value);
    });
  })();
</script>
</body>
</html>
